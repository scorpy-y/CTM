version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: mrp-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: mrp_dashboard
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    networks:
      - mrp-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mrp-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/mrp_dashboard
      NODE_ENV: production
    ports:
      - '5000:5000'
    depends_on:
      - mongodb
    networks:
      - mrp-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mrp-frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    ports:
      - '3000:80'
    depends_on:
      - backend
    networks:
      - mrp-network

volumes:
  mongodb_data:

networks:
  mrp-network:
    driver: bridge
